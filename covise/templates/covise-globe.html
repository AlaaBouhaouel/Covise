    fragmentShader:`varying vec3 vN;void main(){float i=pow(${pow}-dot(vN,vec3(0,0,1)),3.5);vec3 c=mix(vec3(0.15,0.35,0.6),vec3(0.3,0.55,0.85),i);gl_FragColor=vec4(c,i*${mul});}`,
    transparent:true,side:side,depthWrite:false,blending:blend});
  G.add(new THREE.Mesh(new THREE.SphereGeometry(r,64,64),m));
}

const sprites=[];
cities.forEach(c=>{
  const p=ll3(c.lat,c.lng,1.01);
  const sm=new THREE.SpriteMaterial({map:c.g?gT2:gT,color:c.g?0xffcc55:0xffaa44,transparent:true,opacity:c.o,blending:THREE.AdditiveBlending,depthWrite:false});
  const sp=new THREE.Sprite(sm);sp.position.copy(p);sp.scale.set(c.s,c.s,1);
  sp.userData={bo:c.o,ph:Math.random()*6.28,sp:0.25+Math.random()*0.6};
  G.add(sp);sprites.push(sp);
});

// ─── Dense connection arcs ───
function arc(f,t,col,op){
  const a=ll3(f.lat,f.lng,1.01),b=ll3(t.lat,t.lng,1.01);
  const m=a.clone().add(b).multiplyScalar(0.5);
  m.normalize().multiplyScalar(1.01+a.distanceTo(b)*0.3);
  const cv=new THREE.QuadraticBezierCurve3(a,m,b);
  const g=new THREE.BufferGeometry().setFromPoints(cv.getPoints(48));
  G.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,blending:THREE.AdditiveBlending})));
}

// GCC full mesh
const gcc=cities.filter(c=>c.g);
for(let i=0;i<gcc.length;i++)for(let j=i+1;j<gcc.length;j++){
  if(Math.random()>0.2) arc(gcc[i],gcc[j],0x5599cc,0.05+Math.random()*0.06);
}

// Intercontinental — many routes
const intercon=[
  // GCC → Europe
  [0,12],[0,14],[1,12],[1,14],[7,12],[4,14],[3,12],[1,24],[0,28],
  // GCC → Asia
  [1,16],[1,17],[0,21],[1,25],[1,26],[2,16],[5,21],[0,15],
  // GCC → Africa
  [7,22],[0,22],[1,30],[3,22],
  // GCC → Americas
  [1,13],[0,13],[1,19],[0,27],
  // GCC → Oceania
  [1,18],
  // Europe → Americas
  [12,13],[12,29],[14,13],[12,37],[14,23],
  // Europe → Asia
  [12,15],[12,20],[14,15],[24,15],[12,25],
  // Asia → Americas
  [15,19],[15,13],[17,19],[26,27],
  // Asia → Africa
  [21,30],[15,22],
  // Asia → Oceania
  [15,18],[17,18],[25,18],[16,18],
  // Americas internal
  [13,19],[13,27],[13,23],[19,23],
  // Europe → Africa
  [12,22],[14,22],[24,30],
  // Africa → Asia
  [22,21],[22,34],
  // Oceania → Americas
  [18,19],
  // Middle East bridge
  [34,0],[34,1],[34,12],[34,21],
];
intercon.forEach(([a,b])=>{
  if(cities[a]&&cities[b]) arc(cities[a],cities[b],0x2255aa,0.025+Math.random()*0.025);
});

// Random additional connections for density
for(let i=0;i<30;i++){
  const a=Math.floor(Math.random()*cities.length);
  let b=Math.floor(Math.random()*cities.length);
  while(b===a) b=Math.floor(Math.random()*cities.length);
  arc(cities[a],cities[b],0x1a4488,0.015+Math.random()*0.02);
}

// ─── Particles ───
const tC=700;const tG=new THREE.BufferGeometry();const tP=new Float32Array(tC*3);const tD=[];
for(let i=0;i<tC;i++){const r=1.05+Math.random()*.22,th=Math.random()*6.28,ph=Math.acos(2*Math.random()-1),sp=.0002+Math.random()*.0007,dr=(Math.random()-.5)*.00015;tD.push({r,th,ph,sp,dr});tP[i*3]=r*Math.sin(ph)*Math.cos(th);tP[i*3+1]=r*Math.cos(ph);tP[i*3+2]=r*Math.sin(ph)*Math.sin(th)}
tG.setAttribute('position',new THREE.BufferAttribute(tP,3));
const tc=document.createElement('canvas');tc.width=32;tc.height=32;const tx=tc.getContext('2d');
const tgg=tx.createRadialGradient(16,16,0,16,16,16);tgg.addColorStop(0,'rgba(200,220,255,1)');tgg.addColorStop(.25,'rgba(150,190,250,.35)');tgg.addColorStop(1,'rgba(100,160,230,0)');
tx.fillStyle=tgg;tx.fillRect(0,0,32,32);
G.add(new THREE.Points(tG,new THREE.PointsMaterial({map:new THREE.CanvasTexture(tc),size:.009,transparent:true,opacity:.4,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true})));

// ─── Stars ───
const sC=1600,sG=new THREE.BufferGeometry(),sP=new Float32Array(sC*3);
for(let i=0;i<sC;i++){sP[i*3]=(Math.random()-.5)*80;sP[i*3+1]=(Math.random()-.5)*80;sP[i*3+2]=-12-Math.random()*50}
sG.setAttribute('position',new THREE.BufferAttribute(sP,3));
scene.add(new THREE.Points(sG,new THREE.PointsMaterial({size:.04,color:0x8899bb,transparent:true,opacity:.3,sizeAttenuation:true})));

// ─── Mouse/Touch ───
let mX=0,mY=0,drag=false,pX=0,pY=0,dX=0,dY=0;
document.addEventListener('mousemove',e=>{mX=(e.clientX/innerWidth-.5)*2;mY=(e.clientY/innerHeight-.5)*2;if(drag){dY+=(e.clientX-pX)*.005;dX+=(e.clientY-pY)*.003;dX=Math.max(-.8,Math.min(.8,dX));pX=e.clientX;pY=e.clientY}});
document.addEventListener('mousedown',e=>{drag=true;pX=e.clientX;pY=e.clientY});
document.addEventListener('mouseup',()=>{drag=false});
document.addEventListener('touchmove',e=>{const t=e.touches[0];if(drag){dY+=(t.clientX-pX)*.005;dX+=(t.clientY-pY)*.003;dX=Math.max(-.8,Math.min(.8,dX));pX=t.clientX;pY=t.clientY}},{passive:true});
document.addEventListener('touchstart',e=>{drag=true;pX=e.touches[0].clientX;pY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',()=>{drag=false});

// ─── Animate ───
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clock.getElapsedTime();
  G.rotation.y+=(t*.05+mX*.18+dY-G.rotation.y)*.018;
  G.rotation.x+=(mY*.12+dX-G.rotation.x)*.025;
  sprites.forEach(s=>{s.material.opacity=s.userData.bo+Math.sin(t*s.userData.sp+s.userData.ph)*.12});
  const pos=tG.attributes.position.array;
  for(let i=0;i<tC;i++){const d=tD[i];d.th+=d.sp;d.ph+=d.dr;pos[i*3]=d.r*Math.sin(d.ph)*Math.cos(d.th);pos[i*3+1]=d.r*Math.cos(d.ph);pos[i*3+2]=d.r*Math.sin(d.ph)*Math.sin(d.th)}
  tG.attributes.position.needsUpdate=true;
  sun.position.x=Math.cos(t*.025)*5;sun.position.z=Math.sin(t*.025)*4;
  camera.position.y=.5+Math.sin(t*.12)*.03;camera.position.z=3.1+Math.sin(t*.08)*.04;
  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
