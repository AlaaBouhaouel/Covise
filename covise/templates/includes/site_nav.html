{% load static %}
<nav class="nav{% if nav_classes %} {{ nav_classes }}{% endif %}">
    <a href="/" class="logo">
        <img class="logo-dark" src="{% static 'images/index/noBgLogo.png' %}" alt="Covise logo"><img class="logo-light" src="{% static 'images/index/covise_light.png' %}" alt="Covise logo">
        <span>CoVise</span>
    </a>
    <button class="mobile-nav-toggle" id="mobileNavToggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobileNavMenu">
        <svg class="mobile-nav-icon mobile-nav-icon-menu" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="2" y="4" width="16" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="9" width="16" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
        <svg class="mobile-nav-icon mobile-nav-icon-close" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <line x1="4" y1="4" x2="16" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="4" x2="4" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4.5"></circle>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="nav-links">
        {% if show_home %}
        <a href="/" class="nav-link{% if active_page == 'home' %} nav-link-active{% endif %}">HOME</a>
        {% endif %}
        <a href="/about/" class="nav-link{% if active_page == 'about' %} nav-link-active{% endif %}">ABOUT</a>
        <a href="/features/" class="nav-link{% if active_page == 'features' %} nav-link-active{% endif %}">FEATURES</a>
        <a href="{{ nav_cta_href }}" class="nav-link nav-link-demo{% if active_page == 'cta' %} nav-link-active{% endif %}">{{ nav_cta_label }}</a>
    </div>
    <div class="mobile-nav-menu" id="mobileNavMenu" hidden>
        {% if show_home %}
        <a href="/" class="mobile-nav-link{% if active_page == 'home' %} mobile-nav-link-active{% endif %}">HOME</a>
        {% endif %}
        <a href="/about/" class="mobile-nav-link{% if active_page == 'about' %} mobile-nav-link-active{% endif %}">ABOUT</a>
        <a href="/features/" class="mobile-nav-link{% if active_page == 'features' %} mobile-nav-link-active{% endif %}">FEATURES</a>
        <a href="{{ nav_cta_href }}" class="mobile-nav-link mobile-nav-link-demo{% if active_page == 'cta' %} mobile-nav-link-active{% endif %}">{{ nav_cta_label }}</a>
        <button class="mobile-nav-link mobile-theme-link" id="mobileThemeToggle" type="button">
            <svg class="mobile-theme-icon mobile-theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.5"></circle>
                <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
            </svg>
            <svg class="mobile-theme-icon mobile-theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <span class="mobile-theme-label">LIGHT MODE</span>
        </button>
    </div>
</nav>
