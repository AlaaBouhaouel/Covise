<script>
    (function() {
        var nav = document.querySelector('.nav');
        var navToggle = document.getElementById('mobileNavToggle');
        var navMenu = document.getElementById('mobileNavMenu');
        if (!nav || !navToggle || !navMenu) return;

        function closeMenu() {
            navMenu.hidden = true;
            navToggle.setAttribute('aria-expanded', 'false');
            nav.classList.remove('is-menu-open');
        }

        navToggle.addEventListener('click', function() {
            var isOpen = navToggle.getAttribute('aria-expanded') === 'true';
            if (isOpen) {
                closeMenu();
                return;
            }
            navToggle.setAttribute('aria-expanded', 'true');
            navMenu.hidden = false;
            nav.classList.add('is-menu-open');
        });

        navMenu.querySelectorAll('a').forEach(function(link) {
            link.addEventListener('click', closeMenu);
        });

        document.addEventListener('click', function(event) {
            if (!nav.contains(event.target)) closeMenu();
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) closeMenu();
        });
    })();
</script>
<script>
    (function() {
        var btn = document.getElementById('themeToggle');
        var mobileBtn = document.getElementById('mobileThemeToggle');
        var mobileBtnLabel = mobileBtn ? mobileBtn.querySelector('.mobile-theme-label') : null;
        var html = document.documentElement;

        function setTheme(theme) {
            if (theme === 'light') {
                html.setAttribute('data-theme', 'light');
                localStorage.setItem('covise-theme', 'light');
                if (mobileBtnLabel) mobileBtnLabel.textContent = 'DARK MODE';
            } else {
                html.removeAttribute('data-theme');
                localStorage.setItem('covise-theme', 'dark');
                if (mobileBtnLabel) mobileBtnLabel.textContent = 'LIGHT MODE';
            }
        }

        function toggleTheme() {
            var current = html.getAttribute('data-theme');
            setTheme(current === 'light' ? 'dark' : 'light');
        }

        if (btn) btn.addEventListener('click', toggleTheme);
        if (mobileBtn) mobileBtn.addEventListener('click', toggleTheme);
        setTheme(html.getAttribute('data-theme') === 'light' ? 'light' : 'dark');
    })();
</script>
