{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoVise | Waitlist</title>
    <link rel="icon" href="{% static 'images/index/covise_logo.png' %}" type="image/png">
    <link rel="stylesheet" href="{% static 'waitlist.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Darker+Grotesque:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23/build/css/intlTelInput.css">
    <script>
        (function() {
            var theme = localStorage.getItem('covise-theme');
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RDN1TCMRNR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-RDN1TCMRNR');
</script>
<body>
    <main class="waitlist-page">
        <section class="waitlist-card">
            <div class="waitlist-header">
                <div class="brand">
                    <img class="logo-dark" src="{% static 'images/index/noBgLogo.png' %}" alt="Covise logo">
                    <img class="logo-light" src="{% static 'images/index/covise_light.png' %}" alt="Covise logo">
                    <span>CoVise</span>
                </div>
                <a class="back-link" href="/">Back</a>
            </div>
            <h1>Join the Waitlist</h1>
            <p class="intro">Share your info and we will reach out soon.</p>
            {% if error_message %}
            <p class="form-error" role="alert">{{ error_message }}</p>
            {% endif %}

            <form class="waitlist-form" method="post" action="{% url 'Waitlist' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <label for="full_name">Name</label>
                <input id="full_name" name="full_name" type="text" required>

                <label for="phone_number">Phone number</label>
                <div class="phone-wrapper">
                    <input id="phone_number" name="phone_number" type="tel" required>
                </div>

                <label for="email">Email</label>
                <input id="email" name="email" type="email"  required>

                <label for="country">Country</label>
                <select id="country" name="country" required>
                    <option value="">Select your country</option>
                    <option value="bahrain">Bahrain</option>
                    <option value="kuwait">Kuwait</option>
                    <option value="oman">Oman</option>
                    <option value="qatar">Qatar</option>
                    <option value="saudi_arabia">Saudi Arabia</option>
                    <option value="united_arab_emirates">United Arab Emirates</option>
                </select>

                <label class="non-gcc-toggle" for="non_gcc_business">
                    <input id="non_gcc_business" name="non_gcc_business" type="checkbox">
                    Not based in the GCC, but looking to do business there.
                </label>

                <div id="custom-country-field" class="custom-country-field" hidden>
                    <label for="custom_country">Enter your country</label>
                    <input id="custom_country" name="custom_country" type="text" >
                </div>

                <label for="linkedin">LinkedIn</label>
                <input id="linkedin" name="linkedin" type="url" placeholder="https://linkedin.com/in/username" required>
                <label class="non-gcc-toggle linkedin-toggle" for="no_linkedin">
                    <input id="no_linkedin" name="no_linkedin" type="checkbox">
                    I do not have a LinkedIn
                </label>

                <label id="cv-label" for="cv">CV <span class="optional-tag">(Optional)</span></label>
                <input id="cv" name="cv" type="file" accept=".pdf,.doc,.docx">

                <button type="submit">Onboard</button>
            </form>
            
        </section>
    </main>

    <script>
        const countrySelect = document.getElementById('country');
        const nonGccCheckbox = document.getElementById('non_gcc_business');
        const customCountryField = document.getElementById('custom-country-field');
        const customCountryInput = document.getElementById('custom_country');
        const linkedinInput = document.getElementById('linkedin');
        const noLinkedinCheckbox = document.getElementById('no_linkedin');
        const cvInput = document.getElementById('cv');
        const cvLabel = document.getElementById('cv-label');
        const cvNotice = document.getElementById('cv-notice');
        const optionalTag = cvLabel.querySelector('.optional-tag');

        function syncCountryInputs() {
            const hasSelectedGccCountry = countrySelect.value !== '';

            if (hasSelectedGccCountry) {
                nonGccCheckbox.checked = false;
                nonGccCheckbox.disabled = true;
            } else {
                nonGccCheckbox.disabled = false;
            }

            const showCustomCountry = nonGccCheckbox.checked && !nonGccCheckbox.disabled;
            customCountryField.hidden = !showCustomCountry;
            customCountryInput.required = showCustomCountry;

            if (!showCustomCountry) {
                customCountryInput.value = '';
            }

            countrySelect.required = !showCustomCountry;
            countrySelect.disabled = showCustomCountry;
        }

        function syncCvInput() {
            const noLinkedinChecked = noLinkedinCheckbox.checked;

            if (noLinkedinChecked) {
                cvInput.disabled = false;
                cvInput.required = true;
                cvLabel.classList.add('warning');
                cvNotice.classList.add('warning');
                optionalTag.textContent = '(Required)';
                return;
            }

            cvInput.disabled = false;
            cvInput.required = false;
            cvLabel.classList.remove('warning');
            cvNotice.classList.remove('warning');
            optionalTag.textContent = '(Optional)';
        }

        function syncLinkedinInput() {
            const noLinkedinChecked = noLinkedinCheckbox.checked;

            linkedinInput.disabled = noLinkedinChecked;
            linkedinInput.required = !noLinkedinChecked;
            if (noLinkedinChecked) {
                linkedinInput.value = '';
            }

            syncCvInput();
        }

        countrySelect.addEventListener('change', syncCountryInputs);
        nonGccCheckbox.addEventListener('change', syncCountryInputs);
        noLinkedinCheckbox.addEventListener('change', syncLinkedinInput);
        syncCountryInputs();
        syncLinkedinInput();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23/build/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.getElementById('phone_number');
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: 'sa',
            loadUtils: () => import('https://cdn.jsdelivr.net/npm/intl-tel-input@23/build/js/utils.js'),
            separateDialCode: true,
        });

        function normalizePhoneWithCountryCode(rawValue) {
            const typedPhone = (rawValue || '').trim();
            if (!typedPhone) return '';

            // If user already entered an international number, keep it.
            if (typedPhone.startsWith('+')) {
                return '+' + typedPhone.slice(1).replace(/[^\d]/g, '');
            }

            const selectedCountry = iti.getSelectedCountryData();
            const dialCode = selectedCountry && selectedCountry.dialCode
                ? String(selectedCountry.dialCode).replace(/[^\d]/g, '')
                : '';
            const localDigits = typedPhone.replace(/[^\d]/g, '');

            if (!localDigits) return '';
            if (!dialCode) return '+' + localDigits;
            if (localDigits.startsWith(dialCode)) return '+' + localDigits;
            return '+' + dialCode + localDigits;
        }

        document.querySelector('.waitlist-form').addEventListener('submit', function () {
            let formattedPhone = '';
            try {
                formattedPhone = (iti.getNumber() || '').trim();
            } catch (err) {
                formattedPhone = '';
            }

            // Save with explicit country code from selected country when formatter is empty.
            phoneInput.value = formattedPhone || normalizePhoneWithCountryCode(phoneInput.value);
        });
    </script>
</body>
</html>
